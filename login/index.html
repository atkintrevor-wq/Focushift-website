<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in — Focus Shift</title>
  <meta name="description" content="Sign in to Focus Shift on the web with Google or email." />
  <link rel="canonical" href="https://focusshift.app/login/" />
  <meta name="theme-color" content="#0b1220" />
  <link rel="icon" href="../images/logo.png?v=8" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css?v=8" />
  <link rel="stylesheet" href="auth.css?v=4" />
</head>
<body>
  <main class="auth-page">
    <div class="auth-card" id="auth-card">
      <img class="auth-brand" src="../images/focus-shift-app-brand.png?v=8" alt="Focus Shift" width="1174" height="417" decoding="async" />
      <h1 id="auth-title">Sign in</h1>
      <p class="auth-tagline">Shift Your Focus, Shift Your Life</p>

      <div class="auth-banner auth-banner--setup" id="setup-banner" role="alert"></div>
      <div class="auth-banner auth-banner--error" id="error-banner" role="alert"></div>

      <!-- Apple web OAuth disabled: Firebase allows only one Apple Services ID (iOS bundle ID wins).

      <button type="button" class="auth-btn auth-btn-apple" id="btn-apple" disabled>
        <span class="auth-spinner" aria-hidden="true"></span>
        <span class="auth-btn-icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09l.01-.01zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.39-3.74 4.25z"/>
          </svg>
        </span>
        <span class="auth-btn-text">Continue with Apple</span>
      </button>
      <p class="auth-provider-hint">Already use Focus Shift with email? Sign in with email first, then link Apple in Account → Privacy &amp; Security.</p>

      <div id="apple-link-panel" class="auth-link-panel" hidden>
        <p class="auth-link-panel__lede">
          An account already exists for <strong id="apple-link-email"></strong>.
          Enter that account’s password to link your Apple ID (same library and subscription as iOS).
        </p>
        <div class="auth-field">
          <label for="apple-link-password">Password</label>
          <input id="apple-link-password" type="password" autocomplete="current-password" />
        </div>
        <button type="button" class="auth-btn auth-btn-primary" id="btn-apple-link-submit">
          <span class="auth-spinner" aria-hidden="true"></span>
          <span class="auth-btn-text">Link Apple ID and continue</span>
        </button>
        <button type="button" class="auth-link-btn auth-link-panel__cancel" id="btn-apple-link-cancel">Cancel</button>
      </div>
      -->

      <button type="button" class="auth-btn auth-btn-google" id="btn-google" disabled>
        <span class="auth-spinner" aria-hidden="true"></span>
        <span class="auth-btn-text">Continue with Google</span>
      </button>

      <p style="text-align:center;margin:0.75rem 0;color:var(--muted,#8b9bb4);font-size:0.85rem;">or</p>

      <form id="email-form" autocomplete="on">
        <div class="auth-field sign-up-only">
          <label for="firstName">First name</label>
          <input id="firstName" name="given-name" type="text" autocomplete="given-name" />
        </div>
        <div class="auth-field sign-up-only">
          <label for="lastName">Last name</label>
          <input id="lastName" name="family-name" type="text" autocomplete="family-name" />
        </div>
        <div class="auth-field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="username" required />
        </div>
        <div class="auth-field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required />
        </div>
        <div class="auth-field sign-up-only">
          <label for="password2">Confirm password</label>
          <input id="password2" name="password2" type="password" autocomplete="new-password" />
        </div>
        <div class="auth-field auth-remember-field">
          <label class="auth-remember-label">
            <input type="checkbox" id="remember-me" checked />
            <span>Keep me signed in on this device</span>
          </label>
          <p class="auth-remember-hint">
            We never store your password on this site. Your browser or password manager can fill it safely next time.
          </p>
        </div>
        <div class="auth-row-actions sign-in-only">
          <button type="button" class="auth-link-btn" id="btn-forgot">Forgot password?</button>
        </div>
        <button type="submit" class="auth-btn auth-btn-primary" id="btn-email-submit" disabled>
          <span class="auth-spinner" aria-hidden="true"></span>
          <span class="auth-btn-text">Sign in</span>
        </button>
      </form>

      <div class="auth-toggle">
        <span id="toggle-label">New here?</span>
        <button type="button" id="btn-toggle-mode">Create an account</button>
      </div>

      <p class="auth-back"><a href="/">← Back to home</a></p>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="auth.js?v=6"></script>
</body>
</html>
