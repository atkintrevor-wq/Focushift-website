<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shared audio — Focus Shift</title>
  <meta name="description" content="Open this link in Focus Shift to add shared audio to your library." />
  <meta property="og:title" content="Shared audio — Focus Shift" />
  <meta property="og:description" content="Sign in on iPhone, iPad, or the web app to listen and add this audio to My Library." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://focusshift.app/images/focus-shift-app-brand.png?v=8" />
  <meta property="og:image:alt" content="Focus Shift app" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Shared audio — Focus Shift" />
  <meta name="twitter:description" content="Sign in on iPhone, iPad, or the web app to add this audio to your library." />
  <meta name="twitter:image" content="https://focusshift.app/images/focus-shift-app-brand.png?v=8" />
  <meta name="theme-color" content="#0b1220" />
  <link rel="icon" href="/images/logo.png?v=8" type="image/png" />
  <link rel="apple-touch-icon" href="/images/focus-shift-app-brand.png?v=8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css?v=12" />
</head>
<body>
  <main class="share-fallback-page">
    <div class="share-fallback-card">
      <img class="brand" src="/images/focus-shift-app-brand.png?v=8" width="1174" height="417" alt="Focus Shift" decoding="async" />
      <h1>Someone shared Focus Shift audio with you</h1>
      <p id="lead">Sign in to Focus Shift to add this audio to My Library and listen.</p>
      <p class="token" id="tokendisplay" hidden></p>
      <div class="share-fallback-actions">
        <a class="btn btn-primary btn-primary--glow" id="openWeb" href="/login/">Sign in on web</a>
        <a class="btn btn-secondary" id="openApp" href="#">Open in iOS app</a>
      </div>
      <p><a class="secondary" href="/">Focus Shift home</a></p>
      <p class="note" id="platform-note">
        On iPhone or iPad with the app installed, use <strong>Open in iOS app</strong>. On a computer, use <strong>Sign in on web</strong>.
      </p>
    </div>
  </main>
  <script>
    (function () {
      var parts = location.pathname.split("/").filter(Boolean);
      var token = (parts[0] === "s" && parts[1]) ? parts[1] : null;
      var openAppBtn = document.getElementById("openApp");
      var openWebBtn = document.getElementById("openWeb");
      if (token) {
        var deep = "focushift://s/" + encodeURIComponent(token);
        openAppBtn.href = deep;
        openWebBtn.href = "/login/?next=" + encodeURIComponent("/app/?share=" + encodeURIComponent(token));
        var td = document.getElementById("tokendisplay");
        td.hidden = false;
        td.textContent = "Link id: " + token;
      } else {
        openAppBtn.href = "https://testflight.apple.com/join/FPSH36kK";
        openWebBtn.href = "/login/";
        document.getElementById("lead").textContent =
          "This page is for shared listen links. Use the link from your message or email (it should contain /s/…).";
      }
    })();
  </script>
</body>
</html>
