<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Focus Shift — Web</title>
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#0b1220" />
  <link rel="icon" href="../images/logo.png?v=8" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css?v=8" />
  <link rel="stylesheet" href="../login/auth.css?v=1" />
  <style>
    .app-shell { max-width: 720px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
    .app-shell h1 { font-size: 1.5rem; margin-top: 0; }
    .app-muted { color: var(--muted, #8b9bb4); font-size: 0.95rem; line-height: 1.5; }
    .app-admin-links { margin-top: 1rem; display: flex; flex-direction: column; gap: 0.75rem; }
    .app-admin-links a {
      display: block;
      padding: 0.85rem 1rem;
      border-radius: 12px;
      background: rgba(255,255,255,0.06); border: 1px solid var(--stroke, rgba(255,255,255,0.12));
      color: inherit; text-decoration: none; font-weight: 600;
    }
    .app-admin-links a:hover { border-color: #2563eb; }
    .app-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      margin: 1rem 0;
    }
    .app-btn {
      border: 1px solid var(--stroke, rgba(255,255,255,0.12));
      background: rgba(255,255,255,0.06);
      color: inherit;
      border-radius: 10px;
      padding: 0.6rem 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }
    .app-btn:hover { border-color: #2563eb; }
    .app-btn-danger { border-color: rgba(220,38,38,0.5); }
    .app-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--stroke, rgba(255,255,255,0.12));
      border-radius: 14px;
      padding: 1rem;
      margin-bottom: 0.85rem;
    }
    .app-card h3 { margin: 0 0 0.35rem; font-size: 1.05rem; }
    .app-card-meta { font-size: 0.82rem; color: var(--muted, #8b9bb4); margin-bottom: 0.6rem; }
    .app-card-text { white-space: pre-wrap; margin: 0; line-height: 1.45; }
    .app-card-actions { margin-top: 0.75rem; display: flex; gap: 0.5rem; }
    .app-form { margin: 1rem 0; }
    .app-form label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted, #8b9bb4);
      margin-bottom: 0.35rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .app-form input, .app-form textarea {
      width: 100%;
      box-sizing: border-box;
      border-radius: 10px;
      border: 1px solid var(--stroke, rgba(255,255,255,0.15));
      background: rgba(0, 0, 0, 0.2);
      color: inherit;
      padding: 0.72rem 0.85rem;
      margin-bottom: 0.8rem;
      font-family: inherit;
      font-size: 0.95rem;
    }
    .app-form textarea { min-height: 160px; resize: vertical; }
    .app-inline-msg { margin: 0.6rem 0; font-size: 0.9rem; }
    .app-inline-msg.error { color: #fca5a5; }
    .app-inline-msg.success { color: #86efac; }
    .app-tabs {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin: 1rem 0;
    }
    .app-tab-btn {
      border: 1px solid var(--stroke, rgba(255,255,255,0.2));
      background: rgba(255,255,255,0.05);
      color: inherit;
      border-radius: 999px;
      padding: 0.45rem 0.8rem;
      cursor: pointer;
      font-weight: 600;
    }
    .app-tab-btn.is-active {
      background: rgba(37, 99, 235, 0.2);
      border-color: #2563eb;
    }
    .app-section[hidden] { display: none !important; }
    .app-tab-count {
      font-size: 0.78rem;
      opacity: 0.85;
      margin-left: 0.3rem;
    }
    .mini-player {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 1000;
      padding: 0.6rem 0.9rem calc(0.6rem + env(safe-area-inset-bottom));
      background: rgba(9, 15, 30, 0.95);
      border-top: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(8px);
    }
    .mini-player[hidden] { display: none !important; }
    .mini-player-inner {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 0.7rem;
    }
    .mini-player-title {
      font-size: 0.9rem;
      flex: 1;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .mini-player-controls {
      display: flex;
      align-items: center;
      gap: 0.45rem;
    }
    .mini-player-btn {
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.06);
      color: #fff;
      border-radius: 999px;
      min-width: 34px;
      height: 34px;
      padding: 0 0.65rem;
      font-size: 0.82rem;
      cursor: pointer;
    }
    .mini-player-time {
      font-size: 0.75rem;
      opacity: 0.8;
      min-width: 58px;
      text-align: right;
    }
    .app-modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 1400;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .app-modal-backdrop[hidden] { display: none !important; }
    .app-modal {
      width: 100%;
      max-width: 520px;
      background: #0d1529;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 14px;
      padding: 1rem;
      box-shadow: 0 20px 50px rgba(0,0,0,0.45);
    }
    .app-modal h3 { margin: 0 0 0.35rem; }
    .app-modal-list {
      margin: 0.75rem 0;
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
      max-height: 42vh;
      overflow: auto;
    }
    .app-modal-row {
      display: flex;
      gap: 0.45rem;
      align-items: center;
      justify-content: space-between;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 0.55rem 0.7rem;
      background: rgba(255,255,255,0.03);
    }
    .app-modal-row-name {
      font-size: 0.92rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 280px;
    }
    .app-modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
      margin-top: 0.7rem;
    }
  </style>
</head>
<body>
  <main class="app-shell" id="root">
    <p class="app-muted">Loading…</p>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="app.js?v=11"></script>
</body>
</html>
