<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Focus Shift — Web</title>
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#0b1220" />
  <link rel="icon" href="../images/logo.png?v=8" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css?v=8" />
  <link rel="stylesheet" href="../login/auth.css?v=1" />
  <style>
    .app-shell { max-width: 760px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
    .app-shell h1 { font-size: 1.6rem; margin-top: 0; letter-spacing: -0.01em; }
    .app-muted { color: var(--muted, #8b9bb4); font-size: 0.94rem; line-height: 1.5; }
    .app-admin-links { margin-top: 1rem; display: flex; flex-direction: column; gap: 0.75rem; }
    .app-admin-links a {
      display: block;
      padding: 0.85rem 1rem;
      border-radius: 12px;
      background: rgba(255,255,255,0.06); border: 1px solid var(--stroke, rgba(255,255,255,0.12));
      color: inherit; text-decoration: none; font-weight: 600;
    }
    .app-admin-links a:hover { border-color: #2563eb; }
    .app-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      margin: 1rem 0;
    }
    .app-btn {
      border: 1px solid var(--stroke, rgba(255,255,255,0.12));
      background: rgba(255,255,255,0.06);
      color: inherit;
      border-radius: 12px;
      padding: 0.62rem 0.95rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.01em;
    }
    .app-btn:hover { border-color: #2563eb; }
    .app-btn-danger { border-color: rgba(220,38,38,0.5); }
    .app-btn-primary {
      background: linear-gradient(180deg, rgba(37,99,235,0.38), rgba(37,99,235,0.24));
      border-color: rgba(96,165,250,0.8);
    }
    .app-btn-secondary {
      background: rgba(255,255,255,0.03);
      border-color: rgba(255,255,255,0.22);
    }
    .app-btn-ghost {
      background: transparent;
      border-color: rgba(255,255,255,0.18);
      color: var(--muted, #9fb0ca);
    }
    .app-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--stroke, rgba(255,255,255,0.12));
      border-radius: 16px;
      padding: 1.1rem 1rem;
      margin-bottom: 0.95rem;
    }
    .app-glass-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.11), rgba(255,255,255,0.04));
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 18px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.22);
      backdrop-filter: blur(10px);
    }
    .app-home-hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.8rem;
      margin: 0 0 0.65rem;
    }
    .app-home-hero-title {
      font-size: 1.18rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin: 0;
    }
    .app-home-hero-subtitle {
      margin: 0.2rem 0 0;
      color: var(--muted, #9bb0d0);
      font-size: 0.9rem;
    }
    .app-stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(145px, 1fr));
      gap: 0.5rem;
      margin: 0.2rem 0 0;
    }
    .app-stat-tile {
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 14px;
      padding: 0.65rem 0.65rem 0.6rem;
      background: rgba(255,255,255,0.05);
    }
    .app-stat-label {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.74rem;
      color: var(--muted, #9bb0d0);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .app-stat-value {
      margin-top: 0.2rem;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .app-card h3 { margin: 0 0 0.4rem; font-size: 1.08rem; letter-spacing: -0.01em; }
    .app-card-meta { font-size: 0.82rem; color: var(--muted, #8b9bb4); margin-bottom: 0.6rem; }
    .app-card-meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 0.6rem;
    }
    .app-chip {
      display: inline-flex;
      align-items: center;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 999px;
      padding: 0.16rem 0.5rem;
      font-size: 0.72rem;
      color: var(--muted, #9bb0d0);
      background: rgba(255,255,255,0.04);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .app-card-collapsed-note {
      margin: 0.1rem 0 0.25rem;
      color: var(--muted, #9bb0d0);
      font-size: 0.84rem;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
    }
    .app-card-text { white-space: pre-wrap; margin: 0; line-height: 1.52; }
    .app-card-actions { margin-top: 0.75rem; display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .app-form { margin: 1rem 0; }
    .app-form label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted, #8b9bb4);
      margin-bottom: 0.35rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .app-form input, .app-form textarea {
      width: 100%;
      box-sizing: border-box;
      border-radius: 10px;
      border: 1px solid var(--stroke, rgba(255,255,255,0.15));
      background: rgba(0, 0, 0, 0.2);
      color: inherit;
      padding: 0.72rem 0.85rem;
      margin-bottom: 0.8rem;
      font-family: inherit;
      font-size: 0.95rem;
    }
    .app-form textarea { min-height: 160px; resize: vertical; }
    .app-inline-msg { margin: 0.6rem 0; font-size: 0.9rem; }
    .app-inline-msg.error { color: #fca5a5; }
    .app-inline-msg.success { color: #86efac; }
    .app-tabs {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin: 1rem 0;
    }
    .app-tab-btn {
      border: 1px solid var(--stroke, rgba(255,255,255,0.2));
      background: rgba(255,255,255,0.05);
      color: inherit;
      border-radius: 999px;
      padding: 0.48rem 0.86rem;
      cursor: pointer;
      font-weight: 600;
      letter-spacing: 0.01em;
    }
    .app-tab-btn.is-active {
      background: rgba(37, 99, 235, 0.2);
      border-color: #2563eb;
    }
    .app-section[hidden] { display: none !important; }
    .app-tab-count {
      font-size: 0.78rem;
      opacity: 0.85;
      margin-left: 0.3rem;
    }
    .mini-player {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 1000;
      padding: 0.6rem 0.9rem calc(0.6rem + env(safe-area-inset-bottom));
      background: rgba(9, 15, 30, 0.95);
      border-top: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(8px);
    }
    .mini-player[hidden] { display: none !important; }
    .mini-player-inner {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 0.7rem;
    }
    .mini-player-title {
      font-size: 0.9rem;
      flex: 1;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .mini-player-controls {
      display: flex;
      align-items: center;
      gap: 0.45rem;
    }
    .mini-player-btn {
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.06);
      color: #fff;
      border-radius: 999px;
      min-width: 34px;
      height: 34px;
      padding: 0 0.65rem;
      font-size: 0.82rem;
      cursor: pointer;
    }
    .mini-player-time {
      font-size: 0.75rem;
      opacity: 0.8;
      min-width: 58px;
      text-align: right;
    }
    .app-modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 1400;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .app-modal-backdrop[hidden] { display: none !important; }
    .app-modal {
      width: 100%;
      max-width: 520px;
      background: #0d1529;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 14px;
      padding: 1rem;
      box-shadow: 0 20px 50px rgba(0,0,0,0.45);
    }
    .app-modal h3 { margin: 0 0 0.35rem; }
    .app-modal-list {
      margin: 0.75rem 0;
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
      max-height: 42vh;
      overflow: auto;
    }
    .app-modal-row {
      display: flex;
      gap: 0.45rem;
      align-items: center;
      justify-content: space-between;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 0.55rem 0.7rem;
      background: rgba(255,255,255,0.03);
    }
    .app-modal-row-name {
      font-size: 0.92rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 280px;
    }
    .app-modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
      margin-top: 0.7rem;
    }
    .app-modal select,
    .app-modal input,
    .app-modal textarea {
      width: 100%;
      box-sizing: border-box;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(0, 0, 0, 0.2);
      color: #fff;
      padding: 0.62rem 0.75rem;
      font-family: inherit;
      font-size: 0.92rem;
      margin-top: 0.3rem;
      margin-bottom: 0.6rem;
    }
    .app-empty-hint {
      border: 1px dashed rgba(255,255,255,0.25);
      border-radius: 12px;
      padding: 0.9rem;
      background: rgba(255,255,255,0.03);
      font-size: 0.92rem;
      color: var(--muted, #8b9bb4);
      line-height: 1.45;
    }
    .app-section-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.6rem;
      margin: 1rem 0 0.5rem;
    }
    .app-section-title-row h2 {
      margin: 0;
      font-size: 1.1rem;
    }
    @media (max-width: 760px) {
      .app-shell {
        padding: 1rem 0.7rem 4.8rem;
      }
      .app-toolbar {
        gap: 0.45rem;
      }
      .app-btn {
        padding: 0.55rem 0.75rem;
        font-size: 0.9rem;
      }
      .app-tabs {
        position: sticky;
        top: 0;
        z-index: 1200;
        padding: 0.4rem 0;
        margin-top: 0.6rem;
        background: linear-gradient(to bottom, rgba(8,14,28,0.98), rgba(8,14,28,0.9));
        backdrop-filter: blur(6px);
      }
      .app-card {
        padding: 0.9rem;
      }
      .mini-player-inner {
        gap: 0.45rem;
      }
      .mini-player-btn {
        min-width: 32px;
        height: 32px;
      }
      .mini-player-title {
        font-size: 0.84rem;
      }
      .mini-player-time {
        min-width: 48px;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell" id="root">
    <p class="app-muted">Loading…</p>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="app.js?v=21"></script>
</body>
</html>
